    {"title":"New Orleans Map","date":"2026-06-12","client":"Personal Project","thumb":"assets/image/nola-trip-planner.jpg","hashtags":["cartography","map","web scraping","data pipeline","react","collaboration"],"roles":[{"role":"DESIGN & DEVELOPMENT","name":"YULIA VVEDENSKAYA"},{"role":"DATA & DEVELOPMENT","name":"VINCENT NAPLES"}],"existingMedia":[{"name":"hero.mp4","path":"assets/video/hero.mp4","role":"hero"},{"name":"nola-trip-planner.jpg","path":"assets/image/nola-trip-planner.jpg","role":"auto"},{"name":"map-city.jpg","path":"assets/poster/map-city.jpg","role":"poster"},{"name":"map-downtown.jpg","path":"assets/poster/map-downtown.jpg","role":"poster"},{"name":"mobile-list.jpg","path":"assets/poster/mobile-list.jpg","role":"poster"}],"hero":{"type":"video","sources":["assets/video/hero.mp4"],"aspectRatios":["16:9"],"poster":"assets/poster/map-city.jpg"},"carouselImages":["assets/image/nola-trip-planner.jpg","assets/poster/map-city.jpg","assets/poster/map-downtown.jpg","assets/poster/mobile-list.jpg"],"posterImages":[["assets/poster/map-city.jpg","assets/poster/map-downtown.jpg","assets/poster/mobile-list.jpg"]],"overview":"<p><a href=\"https://nola-map.vercel.app/\">The New Orleans Map</a> grew out of the platform we originally built for the <a href=\"../bombay-beach-biennale-schedule-map/\">Bombay Beach Biennale</a>: once the map and schedule app proved itself at the festival, we turned it into a reusable template we customize for the places each of us travels to. New Orleans was the first city to get the treatment — a personal trip planner mapping food, music, neighborhoods, tours, and local tips. Like the rest of the map platform, it&#39;s a collaboration with <a href=\"https://vvex.studio\">VVEX STUDIO</a> partner Yulia Vvedenskaya.</p>\n<p>This time the data challenge wasn&#39;t messy spreadsheets but messy people: the best recommendations for New Orleans live in local Reddit threads, scattered across years of posts and comments. The scraping turned out to be delightfully simple — append <code>.json</code> to any Reddit thread URL and it returns the whole discussion as structured JSON. Three threads gave us three JSON files, which we fed to an LLM with instructions to deduplicate repeated mentions, sort the results, and categorize each spot using the app&#39;s existing tags. That&#39;s how word-of-mouth knowledge — community-recommended venues, restaurants, and bars — became a clean, browsable map layer, from Art and Music to Food, History, and Lodging.</p>\n<p>The frontend reuses the React + Google Maps foundation from the Bombay Beach app — live map with category-colored pins, search and filtering, favorites, schedule and calendar views, satellite/street toggle, and a mobile-first UX for navigating the city on foot. Because the template separates the platform from the data, spinning up the next city is mostly a matter of building its dataset; the map comes for free.</p>\n<p>See also the companion case study at <a href=\"https://vvex.studio/projects/nola-map/\">vvex.studio/projects/nola-map</a>.</p>\n","descriptionRaw":"\n[The New Orleans Map](https://nola-map.vercel.app/) grew out of the platform we originally built for the [Bombay Beach Biennale](../bombay-beach-biennale-schedule-map/): once the map and schedule app proved itself at the festival, we turned it into a reusable template we customize for the places each of us travels to. New Orleans was the first city to get the treatment — a personal trip planner mapping food, music, neighborhoods, tours, and local tips. Like the rest of the map platform, it's a collaboration with [VVEX STUDIO](https://vvex.studio) partner Yulia Vvedenskaya.\n\nThis time the data challenge wasn't messy spreadsheets but messy people: the best recommendations for New Orleans live in local Reddit threads, scattered across years of posts and comments. The scraping turned out to be delightfully simple — append `.json` to any Reddit thread URL and it returns the whole discussion as structured JSON. Three threads gave us three JSON files, which we fed to an LLM with instructions to deduplicate repeated mentions, sort the results, and categorize each spot using the app's existing tags. That's how word-of-mouth knowledge — community-recommended venues, restaurants, and bars — became a clean, browsable map layer, from Art and Music to Food, History, and Lodging.\n\nThe frontend reuses the React + Google Maps foundation from the Bombay Beach app — live map with category-colored pins, search and filtering, favorites, schedule and calendar views, satellite/street toggle, and a mobile-first UX for navigating the city on foot. Because the template separates the platform from the data, spinning up the next city is mostly a matter of building its dataset; the map comes for free.\n\nSee also the companion case study at [vvex.studio/projects/nola-map](https://vvex.studio/projects/nola-map/).\n","id":"new-orleans-map"}
