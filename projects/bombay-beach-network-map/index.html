  <script type="application/json" id="project-meta">
    {"title":"Bombay Beach Network Map","date":"2026-06-13","client":"Mars College","thumb":"assets/image/network-overview.png","hashtags":["cartography","network mapping","openlayers","drone","map","collaboration"],"roles":[{"role":"DESIGN & DEVELOPMENT","name":"YULIA VVEDENSKAYA"},{"role":"DRONE PHOTOGRAPHY & NETWORK DATA","name":"VINCENT NAPLES"}],"existingMedia":[{"name":"hero.mp4","path":"assets/video/hero.mp4","role":"hero"},{"name":"drone-orthophoto.jpg","path":"assets/image/drone-orthophoto.jpg","role":"auto"},{"name":"network-overview.png","path":"assets/image/network-overview.png","role":"auto"},{"name":"app-device-panel.png","path":"assets/poster/app-device-panel.png","role":"poster"},{"name":"device-list.png","path":"assets/poster/device-list.png","role":"poster"},{"name":"town-links.png","path":"assets/poster/town-links.png","role":"poster"}],"hero":{"type":"video","sources":["assets/video/hero.mp4"],"aspectRatios":["16:9"],"poster":"assets/poster/app-device-panel.png"},"carouselImages":["assets/image/drone-orthophoto.jpg","assets/image/network-overview.png","assets/poster/app-device-panel.png","assets/poster/device-list.png","assets/poster/town-links.png"],"posterImages":[["assets/poster/app-device-panel.png","assets/poster/device-list.png","assets/poster/town-links.png"]],"overview":"<p>At <a href=\"https://www.mars.college/\">Mars College</a> — an off-grid community living in the desert near Bombay Beach, CA — we built a <a href=\"https://neocities-network-map.vercel.app/\">live map</a> of the town and the college campus running on one LAN: a single, community-run internet. The idea was simple: show how that shared network actually sits on the ground, not only in a controller dashboard. The project is a collaboration with <a href=\"https://vvex.studio\">VVEX STUDIO</a> partner Yulia Vvedenskaya.</p>\n<p>A small pipeline reads the UniFi and UISP controllers and places every radio, access point, and client on the map at its real coordinates. You get three basemaps — streets, satellite, and a drone orthophoto — with every device and link in view, light animation that suggests traffic moving across links and around access points, and a time bar to scrub sampled snapshots of usage and client connectivity across shorter and longer windows. The frontend is built on OpenLayers.</p>\n<p>Because Google Maps doesn&#39;t show the layout of an off-grid community that builds and unbuilds itself each season, we flew DJI drone photos and stitched them into a single orthophoto aligned to the Google Maps projection — so the campus shows up exactly where it stands. Access point positions were checked on site with GPS, and for each client the detail panel reports IP, signal strength, the associated access point, uptime, and traffic.</p>\n<p>A note on what you&#39;re looking at: this is a case study, not a running service. Mars is temporary — at the end of the season the internet in the desert is taken down together with all the buildings, so the live network no longer exists. Everything here is reconstructed from the controllers&#39; scripts and timeline logs: snapshots, links, and client history were captured while the network was alive, which is exactly why the map can be rebuilt and replayed long after the desert has gone quiet.</p>\n<p>See also the companion case study at <a href=\"https://vvex.studio/projects/network-map/\">vvex.studio/projects/network-map</a>.</p>\n","descriptionRaw":"\nAt [Mars College](https://www.mars.college/) — an off-grid community living in the desert near Bombay Beach, CA — we built a [live map](https://neocities-network-map.vercel.app/) of the town and the college campus running on one LAN: a single, community-run internet. The idea was simple: show how that shared network actually sits on the ground, not only in a controller dashboard. The project is a collaboration with [VVEX STUDIO](https://vvex.studio) partner Yulia Vvedenskaya.\n\nA small pipeline reads the UniFi and UISP controllers and places every radio, access point, and client on the map at its real coordinates. You get three basemaps — streets, satellite, and a drone orthophoto — with every device and link in view, light animation that suggests traffic moving across links and around access points, and a time bar to scrub sampled snapshots of usage and client connectivity across shorter and longer windows. The frontend is built on OpenLayers.\n\nBecause Google Maps doesn't show the layout of an off-grid community that builds and unbuilds itself each season, we flew DJI drone photos and stitched them into a single orthophoto aligned to the Google Maps projection — so the campus shows up exactly where it stands. Access point positions were checked on site with GPS, and for each client the detail panel reports IP, signal strength, the associated access point, uptime, and traffic.\n\nA note on what you're looking at: this is a case study, not a running service. Mars is temporary — at the end of the season the internet in the desert is taken down together with all the buildings, so the live network no longer exists. Everything here is reconstructed from the controllers' scripts and timeline logs: snapshots, links, and client history were captured while the network was alive, which is exactly why the map can be rebuilt and replayed long after the desert has gone quiet.\n\nSee also the companion case study at [vvex.studio/projects/network-map](https://vvex.studio/projects/network-map/).\n","id":"bombay-beach-network-map"}
