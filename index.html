<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VINCENT NAPLES — DRMBT</title>
  <meta name="description" content="Vincent Naples (drmbt) — generative media, interactive installation, projection, AI-driven art. Selected works and case studies.">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <script src="js/accent.js"></script>
  <script src="js/social-nav.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="cv-sidebar" id="cv-sidebar" aria-label="Curriculum vitae">
      <div class="cv-sidebar-inner">
        <header class="cv-head">
          <h1 class="cv-name">VINCENT NAPLES</h1>
          <p class="cv-bio">American, b. 1985, Chicago</p>
          <nav class="cv-contact" id="cv-contact" aria-label="Contact and profiles">
            <!-- links rendered by js/main.js from data/cv.json -->
          </nav>
        </header>
        <div id="cv-list"><!-- sections rendered by js/main.js from data/cv.json --></div>
      </div>
    </aside>

    <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle CV sidebar" aria-expanded="true" aria-controls="cv-sidebar">
      <span class="sidebar-toggle-icon">◀</span>
    </button>

    <div class="main-col">
      <header class="site-header">
        <a href="index.html" class="logo">DRMBT</a>
        <div class="controls">
          <div data-social-nav></div>
        </div>
      </header>

      <div class="filter-bar">
        <div class="search-box" id="search-box">
          <svg class="search-glyph" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
          <div class="search-tokens" id="search-tokens"></div>
          <input type="text" id="search-input" placeholder="search works or #tags…"
                 aria-label="Search works and filter by hashtag" autocomplete="off" spellcheck="false"
                 role="combobox" aria-expanded="false" aria-controls="search-suggest">
          <ul class="search-suggest" id="search-suggest" role="listbox" hidden></ul>
        </div>
      </div>

      <main id="work-grid" class="work-grid" aria-label="Selected works">
        <!-- cards rendered by js/main.js -->
      </main>

      <footer class="site-footer">
        <div class="footer-meta">
          <span>© 2026 Vincent Naples</span>
        </div>
      </footer>
    </div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
